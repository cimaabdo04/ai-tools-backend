version: '3.9'

networks:
  ai-tools-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local
  nginx_logs:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: aitools-postgres
    restart: unless-stopped
    networks:
      - ai-tools-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ai_tools_db}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: aitools-redis
    restart: unless-stopped
    networks:
      - ai-tools-network
    command: >
      redis-server --appendonly yes
        --requirepass ${REDIS_PASSWORD:-}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  backend:
    image: ghcr.io/ai-tools-directory/backend:latest
    container_name: aitools-backend
    restart: unless-stopped
    networks:
      - ai-tools-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ai_tools_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NODE_ENV: production
    ports:
      - '127.0.0.1:4000:4000'
    volumes:
      - ./backend/uploads:/app/uploads:rw
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:4000/api/v1/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    stop_grace_period: 30s
    init: true

  frontend:
    image: ghcr.io/ai-tools-directory/frontend:latest
    container_name: aitools-frontend
    restart: unless-stopped
    networks:
      - ai-tools-network
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: https://api.aitoolsdirectory.com/api/v1
      API_URL: http://backend:4000
      NODE_ENV: production
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    init: true

  nginx:
    image: ghcr.io/ai-tools-directory/nginx:latest
    container_name: aitools-nginx
    restart: unless-stopped
    networks:
      - ai-tools-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 60s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  certbot:
    image: certbot/certbot:latest
    container_name: aitools-certbot
    restart: unless-stopped
    networks:
      - ai-tools-network
    volumes:
      - certbot_data:/var/www/certbot
      - ./docker/ssl:/etc/letsencrypt
    depends_on:
      - nginx
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet
        sleep 12h & wait $${!}
      done;"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
