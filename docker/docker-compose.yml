version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aitools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_tools_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aitools-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: aitools-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_tools_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: aitools-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      API_URL: http://backend:4000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
